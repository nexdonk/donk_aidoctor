name: Announce Release on Discord

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Post release announcement
        env:
          DISCORD_BOT_TOKEN:     ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID:    ${{ secrets.DISCORD_CHANNEL_ID }}
          DISCORD_PING_ROLE_IDS: ${{ vars.DISCORD_PING_ROLE_IDS }}

          BRAND_NAME:   ${{ vars.BRAND_NAME }}
          EMBED_COLOR:  ${{ vars.EMBED_COLOR }}

          STORE_URL_TEMPLATE: ${{ vars.STORE_URL_TEMPLATE }}
          DOCS_URL_TEMPLATE:  ${{ vars.DOCS_URL_TEMPLATE }}
          CFX_URL_TEMPLATE:   ${{ vars.CFX_URL_TEMPLATE }}

          STORE_URL_OVERRIDE: ${{ vars.STORE_URL }}
          DOCS_URL_OVERRIDE:  ${{ vars.DOCS_URL }}
          CFX_URL_OVERRIDE:   ${{ vars.CFX_URL }}

          BANNER_OVERRIDE_URL: ${{ vars.BANNER_OVERRIDE_URL }}

          REPO_FULL:           ${{ github.repository }}
          REPO_NAME:           ${{ github.event.repository.name }}
          REPO_OWNER:          ${{ github.repository_owner }}
          REPO_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}

          RELEASE_TAG:          ${{ github.event.release.tag_name }}
          RELEASE_NAME:         ${{ github.event.release.name }}
          RELEASE_BODY:         ${{ github.event.release.body }}
          RELEASE_URL:          ${{ github.event.release.html_url }}
          RELEASE_PUBLISHED_AT: ${{ github.event.release.published_at }}
        run: node .github/scripts/build-discord-payload.mjs
